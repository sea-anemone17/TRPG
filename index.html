<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORPG 판정기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f5efff, #eef6ff, #fff7fb);
      font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
      color: #2d2d38;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(110, 92, 180, 0.15);
    }

    h1 {
      margin: 0 0 24px;
      font-size: 2rem;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d8dcec;
      border-radius: 14px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: #8c7cff;
      box-shadow: 0 0 0 4px rgba(140, 124, 255, 0.12);
    }

    button {
      width: 100%;
      padding: 15px 18px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #8c7cff, #6da8ff);
      color: white;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 24px rgba(123, 107, 202, 0.25);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .result-box {
      margin-top: 24px;
      min-height: 120px;
      border-radius: 20px;
      padding: 20px;
      background: linear-gradient(180deg, #ffffff, #f7f8ff);
      border: 1px solid #e5e8f3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .number {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .judge {
      font-size: 1.15rem;
      font-weight: 800;
    }

    .subtext {
      margin-top: 10px;
      font-size: 0.94rem;
      color: #666b7d;
    }

    .pop {
      animation: pop 0.35s ease;
    }

    .shake {
      animation: shake 0.45s ease;
    }

    .glow-success {
      box-shadow: 0 0 0 4px rgba(130, 255, 190, 0.18), 0 18px 40px rgba(80, 190, 130, 0.18);
    }

    .glow-fail {
      box-shadow: 0 0 0 4px rgba(255, 140, 140, 0.18), 0 18px 40px rgba(220, 90, 90, 0.18);
    }

    @keyframes pop {
      0% {
        transform: scale(0.88);
        opacity: 0;
      }
      60% {
        transform: scale(1.05);
        opacity: 1;
      }
      100% {
        transform: scale(1);
      }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🎲 ORPG 1d100 판정기</h1>

    <div class="field">
      <label for="stat">기능치 (1~99)</label>
      <input id="stat" type="number" min="1" max="99" placeholder="예: 60">
    </div>

    <div class="field">
      <label for="bp">보너스/패널티 (-2~2)</label>
      <input id="bp" type="number" min="-2" max="2" value="0">
    </div>

    <button onclick="roll()">굴리기</button>

    <div class="result-box" id="resultBox">
      <div class="number" id="number">--</div>
      <div class="judge" id="judge">아직 판정 전입니다.</div>
      <div class="subtext" id="subtext">버튼을 눌러 주사위를 굴려 보세요.</div>
    </div>
  </div>

  <script>
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function roll() {
      const stat = parseInt(document.getElementById("stat").value);
      const bp = parseInt(document.getElementById("bp").value);
      const numberEl = document.getElementById("number");
      const judgeEl = document.getElementById("judge");
      const subtextEl = document.getElementById("subtext");
      const resultBox = document.getElementById("resultBox");

      if (isNaN(stat) || stat < 1 || stat > 99) {
        alert("기능치는 1~99 사이로 입력해 주세요.");
        return;
      }

      if (isNaN(bp) || bp < -2 || bp > 2) {
        alert("보너스/패널티는 -2~2 사이로 입력해 주세요.");
        return;
      }

      resultBox.classList.remove("pop", "shake", "glow-success", "glow-fail");
      judgeEl.innerText = "주사위를 굴리는 중...";
      subtextEl.innerText = "잠시만요 ✨";

      for (let i = 0; i < 10; i++) {
        numberEl.innerText = Math.floor(Math.random() * 100) + 1;
        await sleep(60);
      }

      const units = Math.floor(Math.random() * 10);
      let tensList = [];

      for (let i = 0; i <= Math.abs(bp); i++) {
        tensList.push(Math.floor(Math.random() * 10) * 10);
      }

      let results = tensList.map(t => {
        if (t === 0 && units === 0) return 100;
        return t + units;
      });

      let final;
      if (bp > 0) final = Math.min(...results);
      else if (bp < 0) final = Math.max(...results);
      else final = results[0];

      let text;
      if (final === 1) text = "🌟 대성공";
      else if (final === 100) text = "💥 대실패";
      else if (final <= stat / 5) text = "✨ 극단적 성공";
      else if (final <= stat / 2) text = "✅ 어려운 성공";
      else if (final <= stat) text = "☑️ 보통 성공";
      else text = "❌ 실패";

      numberEl.innerText = final;
      judgeEl.innerText = text;
      subtextEl.innerText =
        `1의 자리: ${units} | 10의 자리 후보: ${tensList.join(", ")} | 결과 후보: ${results.join(", ")}`;

      void resultBox.offsetWidth;
      resultBox.classList.add("pop");

      if (text.includes("실패")) {
        resultBox.classList.add("shake", "glow-fail");
      } else {
        resultBox.classList.add("glow-success");
      }
    }
  </script>

</body>
</html>

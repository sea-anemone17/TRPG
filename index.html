<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORPG 판정기</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f5efff, #eef6ff, #fff7fb);
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #2d2d38;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(110, 92, 180, 0.15);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #666b7d;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d8dcec;
      border-radius: 14px;
      font-size: 1rem;
      outline: none;
      background: white;
    }

    input:focus, select:focus {
      border-color: #8c7cff;
      box-shadow: 0 0 0 4px rgba(140, 124, 255, 0.12);
    }

    .section {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px dashed #d8dcec;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1rem;
      font-weight: 800;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      padding: 13px 18px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #8c7cff, #6da8ff);
      color: white;
      font-size: 0.96rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(123, 107, 202, 0.25);
      transition: transform 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .sub-button {
      background: #eef1fb;
      color: #4f566f;
      box-shadow: none;
    }

    .result-box {
      margin-top: 24px;
      min-height: 150px;
      border-radius: 20px;
      padding: 20px;
      background: linear-gradient(180deg, #ffffff, #f7f8ff);
      border: 1px solid #e5e8f3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      justify-content: center;
    }

    .badge {
      padding: 7px 12px;
      border-radius: 999px;
      background: #f1f3ff;
      color: #50577a;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .number {
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -0.04em;
    }

    .judge {
      font-size: 1.15rem;
      font-weight: 800;
    }

    .subtext {
      margin-top: 10px;
      font-size: 0.94rem;
      color: #666b7d;
      text-align: center;
      line-height: 1.5;
    }

    .history-box {
      margin-top: 22px;
      border-top: 1px dashed #d8dcec;
      padding-top: 18px;
    }

    .history-title {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 800;
    }

    .history-list, .skill-list {
      display: grid;
      gap: 10px;
    }

    .history-item, .skill-item {
      background: #f7f8ff;
      border: 1px solid #e4e7f5;
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.5;
      font-size: 0.93rem;
      color: #50566c;
    }

    .history-empty {
      color: #7b8195;
      font-size: 0.93rem;
    }

    .skill-chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .skill-chip {
      background: #eef1ff;
      color: #4e5680;
      border: 1px solid #dfe4f7;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .pop {
      animation: pop 0.35s ease;
    }

    .shake {
      animation: shake 0.45s ease;
    }

    .glow-success {
      box-shadow: 0 0 0 4px rgba(130, 255, 190, 0.18), 0 18px 40px rgba(80, 190, 130, 0.18);
    }

    .glow-fail {
      box-shadow: 0 0 0 4px rgba(255, 140, 140, 0.18), 0 18px 40px rgba(220, 90, 90, 0.18);
    }

    @keyframes pop {
      0% { transform: scale(0.88); opacity: 0; }
      60% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 640px) {
      .card { padding: 20px; }
      .number { font-size: 2.4rem; }
      .button-row { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎲 ORPG 1d100 판정기</h1>
    <p class="subtitle">판정 이름, 기능치, 보너스/패널티를 입력하고 주사위를 굴려 보세요.</p>

    <div class="field">
      <label for="statName">판정 이름</label>
      <input id="statName" type="text" placeholder="예: 관찰, 회피, 설득">
    </div>

    <div class="field">
      <label for="stat">기능치 (1~99)</label>
      <input id="stat" type="number" min="1" max="99" placeholder="예: 60">
    </div>

    <div class="field">
      <label for="bp">보너스/패널티 (-2~2)</label>
      <input id="bp" type="number" min="-2" max="2" value="0">
    </div>

    <div class="button-row">
      <button id="rollButton">굴리기</button>
      <button class="sub-button" id="clearHistoryButton" type="button">기록 지우기</button>
    </div>

    <div class="section">
      <div class="section-title">캐릭터 저장</div>

      <div class="field">
        <label for="characterName">캐릭터 이름</label>
        <input id="characterName" type="text" placeholder="예: Hazel">
      </div>

      <div class="field">
        <label for="characterSelect">저장된 캐릭터</label>
        <select id="characterSelect">
          <option value="">캐릭터를 선택하세요</option>
        </select>
      </div>

      <div class="button-row">
        <button id="saveSkillButton" type="button">현재 기능 저장</button>
        <button class="sub-button" id="deleteCharacterButton" type="button">선택 캐릭터 삭제</button>
      </div>

      <div class="field" style="margin-top:14px;">
        <label>저장된 기능</label>
        <div class="skill-list" id="savedSkills">
          <div class="history-empty">아직 저장된 기능이 없습니다.</div>
        </div>
      </div>
    </div>

    <div class="result-box" id="resultBox">
      <div class="badge-row">
        <div class="badge" id="badgeName">판정 이름 없음</div>
        <div class="badge" id="badgeStat">기능치 -</div>
        <div class="badge" id="badgeMode">일반</div>
      </div>

      <div class="number" id="number">--</div>
      <div class="judge" id="judge">아직 판정 전입니다.</div>
      <div class="subtext" id="subtext">버튼을 눌러 주사위를 굴려 보세요.</div>
    </div>

    <div class="history-box">
      <div class="history-title">최근 기록</div>
      <div class="history-list" id="historyList">
        <div class="history-empty">아직 기록이 없습니다.</div>
      </div>
    </div>
  </div>

  <script>
    const HISTORY_KEY = "orpg_d100_history";
    const CHARACTER_KEY = "orpg_d100_characters";

    function sleep(ms) {
      return new Promise(function(resolve) {
        setTimeout(resolve, ms);
      });
    }

    function makeD100(tens, units) {
      if (tens === 0 && units === 0) return 100;
      return tens + units;
    }

    function judgeResult(final, stat) {
      if (final === 1) return "🌟 대성공";
      if (final === 100) return "💥 대실패";
      if (final <= Math.floor(stat / 5)) return "✨ 극단적 성공";
      if (final <= Math.floor(stat / 2)) return "✅ 어려운 성공";
      if (final <= stat) return "☑️ 보통 성공";
      return "❌ 실패";
    }

    function modeText(bp) {
      if (bp > 0) return "보너스 " + bp;
      if (bp < 0) return "패널티 " + Math.abs(bp);
      return "일반";
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveHistory(history) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function loadCharacters() {
      try {
        const raw = localStorage.getItem(CHARACTER_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (error) {
        return {};
      }
    }

    function saveCharacters(characters) {
      localStorage.setItem(CHARACTER_KEY, JSON.stringify(characters));
    }

    function renderHistory() {
      const historyList = document.getElementById("historyList");
      const history = loadHistory();

      if (history.length === 0) {
        historyList.innerHTML = '<div class="history-empty">아직 기록이 없습니다.</div>';
        return;
      }

      historyList.innerHTML = history.map(function(item) {
        return `
          <div class="history-item">
            <strong>${item.statName}</strong> | 기능치 ${item.stat} | ${item.mode}<br>
            결과 ${item.final} → ${item.judge}<br>
            <span style="color:#7a8094;">${item.detail}</span>
          </div>
        `;
      }).join("");
    }

    function renderCharacterSelect() {
      const select = document.getElementById("characterSelect");
      const characters = loadCharacters();
      const names = Object.keys(characters).sort();

      select.innerHTML = '<option value="">캐릭터를 선택하세요</option>' +
        names.map(function(name) {
          return `<option value="${name}">${name}</option>`;
        }).join("");
    }

    function renderSavedSkills() {
      const savedSkills = document.getElementById("savedSkills");
      const selectedCharacter = document.getElementById("characterSelect").value;
      const characters = loadCharacters();

      if (!selectedCharacter || !characters[selectedCharacter]) {
        savedSkills.innerHTML = '<div class="history-empty">아직 저장된 기능이 없습니다.</div>';
        return;
      }

      const skills = characters[selectedCharacter];
      const entries = Object.entries(skills);

      if (entries.length === 0) {
        savedSkills.innerHTML = '<div class="history-empty">아직 저장된 기능이 없습니다.</div>';
        return;
      }

      savedSkills.innerHTML = `
        <div class="skill-chip-wrap">
          ${entries.map(function(entry) {
            const skillName = entry[0];
            const skillValue = entry[1];
            return `<button class="skill-chip" onclick="applySkill('${selectedCharacter}', '${skillName}')">${skillName} ${skillValue}</button>`;
          }).join("")}
        </div>
      `;
    }

    function applySkill(characterName, skillName) {
      const characters = loadCharacters();
      const value = characters[characterName][skillName];
      document.getElementById("characterName").value = characterName;
      document.getElementById("statName").value = skillName;
      document.getElementById("stat").value = value;
    }

    function saveCurrentSkill() {
      const characterNameInput = document.getElementById("characterName").value.trim();
      const statName = document.getElementById("statName").value.trim();
      const stat = parseInt(document.getElementById("stat").value);

      if (!characterNameInput) {
        alert("캐릭터 이름을 입력해 주세요.");
        return;
      }

      if (!statName) {
        alert("판정 이름을 입력해 주세요.");
        return;
      }

      if (isNaN(stat) || stat < 1 || stat > 99) {
        alert("기능치는 1~99 사이로 입력해 주세요.");
        return;
      }

      const characters = loadCharacters();

      if (!characters[characterNameInput]) {
        characters[characterNameInput] = {};
      }

      characters[characterNameInput][statName] = stat;
      saveCharacters(characters);

      renderCharacterSelect();
      document.getElementById("characterSelect").value = characterNameInput;
      renderSavedSkills();
      alert("저장되었습니다.");
    }

    function deleteSelectedCharacter() {
      const select = document.getElementById("characterSelect");
      const selectedCharacter = select.value;

      if (!selectedCharacter) {
        alert("삭제할 캐릭터를 선택해 주세요.");
        return;
      }

      const ok = confirm(selectedCharacter + " 캐릭터를 삭제할까요?");
      if (!ok) return;

      const characters = loadCharacters();
      delete characters[selectedCharacter];
      saveCharacters(characters);

      renderCharacterSelect();
      renderSavedSkills();
      document.getElementById("characterName").value = "";
    }

    function clearHistory() {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
    }

    async function roll() {
      const statNameInput = document.getElementById("statName").value.trim();
      const statName = statNameInput === "" ? "이름 없는 판정" : statNameInput;
      const stat = parseInt(document.getElementById("stat").value);
      const bp = parseInt(document.getElementById("bp").value);

      const numberEl = document.getElementById("number");
      const judgeEl = document.getElementById("judge");
      const subtextEl = document.getElementById("subtext");
      const resultBox = document.getElementById("resultBox");

      const badgeName = document.getElementById("badgeName");
      const badgeStat = document.getElementById("badgeStat");
      const badgeMode = document.getElementById("badgeMode");

      if (isNaN(stat) || stat < 1 || stat > 99) {
        alert("기능치는 1~99 사이로 입력해 주세요.");
        return;
      }

      if (isNaN(bp) || bp < -2 || bp > 2) {
        alert("보너스/패널티는 -2~2 사이로 입력해 주세요.");
        return;
      }

      badgeName.innerText = statName;
      badgeStat.innerText = "기능치 " + stat;
      badgeMode.innerText = modeText(bp);

      resultBox.classList.remove("pop", "shake", "glow-success", "glow-fail");
      judgeEl.innerText = "주사위를 굴리는 중...";
      subtextEl.innerText = "잠시만요 ✨";

      for (let i = 0; i < 10; i++) {
        numberEl.innerText = Math.floor(Math.random() * 100) + 1;
        await sleep(60);
      }

      const units = Math.floor(Math.random() * 10);
      const tensList = [];

      for (let i = 0; i <= Math.abs(bp); i++) {
        tensList.push(Math.floor(Math.random() * 10) * 10);
      }

      const results = tensList.map(function(t) {
        return makeD100(t, units);
      });

      let final;
      if (bp > 0) final = Math.min(...results);
      else if (bp < 0) final = Math.max(...results);
      else final = results[0];

      const text = judgeResult(final, stat);

      numberEl.innerText = final;
      judgeEl.innerText = text;
      subtextEl.innerText =
        "1의 자리: " + units +
        " | 10의 자리 후보: " + tensList.join(", ") +
        " | 결과 후보: " + results.join(", ");

      void resultBox.offsetWidth;
      resultBox.classList.add("pop");

      if (text.includes("실패")) {
        resultBox.classList.add("shake", "glow-fail");
      } else {
        resultBox.classList.add("glow-success");
      }

      const history = loadHistory();
      history.unshift({
        statName: statName,
        stat: stat,
        mode: modeText(bp),
        final: final,
        judge: text,
        detail: "1의 자리 " + units + " / 후보 " + results.join(", ")
      });

      if (history.length > 8) {
        history.pop();
      }

      saveHistory(history);
      renderHistory();
    }

    document.getElementById("rollButton").addEventListener("click", roll);
    document.getElementById("clearHistoryButton").addEventListener("click", clearHistory);
    document.getElementById("saveSkillButton").addEventListener("click", saveCurrentSkill);
    document.getElementById("deleteCharacterButton").addEventListener("click", deleteSelectedCharacter);
    document.getElementById("characterSelect").addEventListener("change", function() {
      const selected = this.value;
      document.getElementById("characterName").value = selected;
      renderSavedSkills();
    });

    renderHistory();
    renderCharacterSelect();
    renderSavedSkills();
  </script>
</body>
</html>
